<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOS Workspace — Design Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #F7F7F5; font-family: 'Inter', sans-serif; }
  iframe.dc-screen {
    width: 100%; height: 100%;
    border: 0; display: block;
    background: #fff;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const Screen = ({ src }) => (
  <iframe className="dc-screen" src={src} loading="lazy" />
);

function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="marketing"
        title="DOS Workspace"
        subtitle="High-fidelity screens for the multi-tool research platform. Pan, scroll inside, or focus any artboard."
      >
        <DCArtboard id="landing" label="01 · Landing page" width={1440} height={2400}>
          <Screen src="screens/landing.html" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="auth"
        title="Authenticated app"
        subtitle="Sidebar + topbar shell. Dashboard, then admin team management."
      >
        <DCArtboard id="dashboard" label="02 · Dashboard" width={1440} height={1024}>
          <Screen src="screens/dashboard.html" />
        </DCArtboard>
        <DCArtboard id="user-mgmt" label="03 · User management" width={1440} height={1100}>
          <Screen src="screens/user-management.html" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="flow"
        title="Add project wizard"
        subtitle="3-step modal. Top frame shows step 1 in context. Strip below shows steps 2 and 3."
      >
        <DCArtboard id="add-project" label="04 · Add project (3 steps)" width={1440} height={2100}>
          <Screen src="screens/add-project.html" />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="system"
        title="Design system"
        subtitle="Tokens and component states pulled from across the screens."
      >
        <DCArtboard id="components" label="05 · Component sheet" width={1440} height={3200}>
          <Screen src="screens/components.html" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
